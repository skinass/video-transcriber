source: raw
destination: subtitles

# Размер модели. Чем больше — тем точнее, но медленнее:
#   tiny   — самая быстрая, низкая точность
#   base   — быстрая, приемлемая точность
#   small  — баланс скорости и точности
#   medium — высокая точность, медленнее
#   large  — максимальная точность, требует много RAM/VRAM
model: small

# Язык аудио. null = автоопределение.
# Примеры: "ru", "en", "de", "fr", "ja"
language: ru
